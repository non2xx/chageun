name: ci
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: 테스트(직렬, 골든·패리티·드리프트 포함)
        run: npm test
      - name: 빌드 재현성 — 커밋된 dist 무드리프트
        run: |
          npm run build
          git diff --exit-code dist/ || (echo "::error::dist/가 src와 어긋남 — npm run build 후 커밋하세요" && exit 1)
